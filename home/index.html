<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unchained Commerce Shop | Infrastructure SaaS</title>
    <script src="

https://tailwindcss.com

"></script>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #e2e8f0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .coin-active { border-color: #818cf8; background: rgba(129, 140, 248, 0.2); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">

    <!-- Header -->
    <header class="text-center mb-10">
        <h1 class="text-4xl md:text-6xl font-extrabold gradient-text mb-2">Unchained Commerce</h1>
        <p class="text-slate-400">Packaged Infrastructure as a Service (PaaS)</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 w-full max-w-7xl">
        
        <!-- Product Catalog -->
        <div class="lg:col-span-2 space-y-6">
            <h2 class="text-2xl font-semibold mb-4">Infrastructure Modules</h2>
            <div id="catalog" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Items dynamically loaded -->
            </div>
        </div>

        <!-- Checkout Sidebar -->
        <div class="space-y-6">
            <div class="glass p-6 rounded-2xl sticky top-10">
                <h3 class="text-xl font-bold mb-4 flex justify-between">
                    Your Cart <span id="cart-count" class="bg-indigo-600 text-xs px-2 py-1 rounded-full">0</span>
                </h3>
                
                <div id="cart-items" class="space-y-3 mb-6 max-h-48 overflow-y-auto">
                    <p class="text-slate-500 text-sm">Cart is empty...</p>
                </div>

                <div class="border-t border-slate-700 pt-4 mb-6">
                    <div class="flex justify-between text-lg font-bold">
                        <span>Total</span>
                        <span id="total-price">$0.00</span>
                    </div>
                </div>

                <!-- Coin Selector -->
                <label class="block text-sm font-medium text-slate-400 mb-2">Select Payment Currency</label>
                <div id="coin-grid" class="grid grid-cols-3 gap-2 mb-6">
                    <!-- Tickers added by JS -->
                </div>

                <!-- Payment Details (Conditional) -->
                <div id="payment-panel" class="hidden animate-pulse">
                    <div class="bg-slate-900 p-4 rounded-xl mb-4 text-center">
                        <p class="text-xs text-slate-500 mb-2">Scan to Pay</p>
                        <img id="qr-code" class="mx-auto bg-white p-2 rounded-lg mb-4 w-32 h-32" src="" alt="Payment QR">
                        <p id="crypto-amount" class="font-mono text-indigo-400 font-bold">0.0000</p>
                        <p id="wallet-addr" class="text-[10px] break-all text-slate-500 mt-2 cursor-pointer hover:text-indigo-300" onclick="copyAddr()">...</p>
                    </div>
                    
                    <input type="email" id="customer-email" placeholder="Delivery Email" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 mb-4 focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button onclick="checkout()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-lg transition-all">Verify & Claim Assets</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            GAS_URL: 'https://script.google.com/macros/s/AKfycbxSW2CwKSauKah_WTFspcoTC38Y6bLawX6DNFsDDjJyoZhxpLxbZmcggu5T9RB7Bga_Tg/exec',
            WALLETS: {
                BTC: "1GCP51GiKrJkUPXzBnmB3T7okBz3JVj36Z",
                SOL: "HedirYhUvULvAZRB68pExPujTKLRafNNyhP6K3WdaiE1",
                TRX: "TXuStMHPUxoRX8NPTTpJU6jBsBtZDRw2Uz",
                USDC: "HedirYhUvULvAZRB68pExPujTKLRafNNyhP6K3WdaiE1",
                LTC: "MN5d3nwpXij3V1abxyZSCXLXyQKpXap56q"
                DOGE: "D8SW7toPoRqRyBVe18V8cwaSQJep8kVf8d",
                BCH: "bitcoincash:qzh5jn8tc47phecg743r8rte8adk2v0qdcyapg52vx",
                DASH: "Xv2Zn51FkWEeYYGhKbGBAP3U2nfFRKGqeY",
                ZEC: "t1TCjRWWmGp974MUVM91rp4hdM9BSQFLGU3",
                ADA: "addr1qyeudreh3zp35sf33xeun0t7rk9gehulsd6tr02f3c489uj0zn5t6q37mnk7w9an38a3wts2ncu93jatfmqgexm6c5wsx3sqwf",
                BNB: "0xA5DA8f2A741C41aE1E0D5e51b83768f4142fb578",
                DGB: "DLyigrUs5hZmyJRXKYJMJW33mv9cswjnnm",
                SOL: "HedirYhUvULvAZRB68pExPujTKLRafNNyhP6K3WdaiE1",
                USDC: "HedirYhUvULvAZRB68pExPujTKLRafNNyhP6K3WdaiE1",
                TRX: "TXuStMHPUxoRX8NPTTpJU6jBsBtZDRw2Uz",
                USDT: "TXuStMHPUxoRX8NPTTpJU6jBsBtZDRw2Uz",
                XRP: "YOUR_XRP_ADDRESS_HERE",
                XLM: "YOUR_XLM_ADDRESS_HERE"
                // Add remaining 10 from previous list...
            },
            CG_IDS: { BTC: 'bitcoin', SOL: 'solana', TRX: 'tron', USDC: 'usd-coin', LTC: 'litecoin' }
        };

        const products = [
            { id: 1, name: "Core Shop Engine", price: 49.99, desc: "Base infrastructure with bot backend." },
            { id: 2, name: "Web3 Wallet Connect", price: 19.99, desc: "Frontend wallet integration module." },
            { id: 3, name: "Admin Dashboard", price: 29.99, desc: "Advanced GUI for transaction logs." }
        ];

        let cart = [];
        let selectedTicker = null;

        function renderCatalog() {
            const html = products.map(p => `
                <div class="glass p-5 rounded-xl flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold text-lg text-indigo-300">${p.name}</h3>
                        <p class="text-sm text-slate-400 mt-1">${p.desc}</p>
                    </div>
                    <div class="mt-4 flex justify-between items-center">
                        <span class="font-bold text-xl">$${p.price}</span>
                        <button onclick="addToCart(${p.id})" class="bg-indigo-600/20 hover:bg-indigo-600 text-indigo-400 hover:text-white px-4 py-2 rounded-lg text-sm transition-colors border border-indigo-600/30">Add</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('catalog').innerHTML = html;
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            cart.push(item);
            updateCart();
        }

        function updateCart() {
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('total-price').innerText = `$${total.toFixed(2)}`;
            
            const itemsHtml = cart.map((p, i) => `
                <div class="flex justify-between text-sm bg-slate-800/50 p-2 rounded">
                    <span>${p.name}</span>
                    <button onclick="removeFromCart(${i})" class="text-red-400">×</button>
                </div>
            `).join('');
            document.getElementById('cart-items').innerHTML = cart.length ? itemsHtml : '<p class="text-slate-500 text-sm">Cart is empty...</p>';
            if(selectedTicker) refreshRate();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function initCoins() {
            const html = Object.keys(CONFIG.WALLETS).map(t => `
                <button onclick="selectCoin('${t}')" id="btn-${t}" class="coin-btn bg-slate-800 border border-slate-700 p-2 rounded text-xs hover:border-indigo-500 transition-all">${t}</button>
            `).join('');
            document.getElementById('coin-grid').innerHTML = html;
        }

        async function selectCoin(ticker) {
            selectedTicker = ticker;
            document.querySelectorAll('.coin-btn').forEach(b => b.classList.remove('coin-active'));
            document.getElementById(`btn-${ticker}`).classList.add('coin-active');
            document.getElementById('payment-panel').classList.remove('hidden');
            refreshRate();
        }

        async function refreshRate() {
            const totalUSD = cart.reduce((sum, p) => sum + p.price, 0);
            if(totalUSD === 0) return;
            
            try {
                const id = CONFIG.CG_IDS[selectedTicker] || 'bitcoin';
                const resp = await fetch(`

[https://coingecko.com](https://www.coingecko.com/en/portfolio)

{id}&vs_currencies=usd`);
                const data = await resp.json();
                const rate = data[id].usd;
                const cryptoAmount = (totalUSD / rate).toFixed(6);
                
                document.getElementById('crypto-amount').innerText = `${cryptoAmount} ${selectedTicker}`;
                document.getElementById('wallet-addr').innerText = CONFIG.WALLETS[selectedTicker];
                
                // QR Generator
                const qrUrl = `https://qrserver.com{CONFIG.WALLETS[selectedTicker]}`;
                document.getElementById('qr-code').src = qrUrl;
                document.getElementById('payment-panel').classList.remove('animate-pulse');
            } catch (e) {
                console.error("Price fetch failed");
            }
        }

        function copyAddr() {
            navigator.clipboard.writeText(CONFIG.WALLETS[selectedTicker]);
            alert("Address Copied!");
        }

        async function checkout() {
            const email = document.getElementById('customer-email').value;
            if(!email || cart.length === 0) return alert("Fill cart and email!");
            
            fetch(CONFIG.GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ email, ticker: selectedTicker, cart: cart })
            });
            alert("Bot verification started! Stay tuned to your inbox.");
        }

        renderCatalog();
        initCoins();
    </script>
</body>
</html>
